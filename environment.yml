name: kingems
channels:
- conda-forge
- defaults

# =============================================================================
# kinGEMs Conda Environment Configuration
# All versions are pinned to ensure reproducible results across different
# systems. Update both environment.yml and requirements.txt when upgrading.
# =============================================================================

dependencies:
  # Core scientific packages (pinned versions)
  - python=3.11
  - cobra=0.29.1
  - numpy=1.26.4
  - pandas=2.2.3
  - scipy=1.15.2
  - pyomo=6.9.4
  - scikit-learn=1.7.1
  - dask=2025.9.1
  - distributed=2025.9.1
  
  # Supporting packages
  - seaborn=0.13.2
  - biopython=1.85
  - bioservices=1.11.0
  
  # Utilities
  - loguru=0.7.2
  - mkdocs=1.6.0
  - python-dotenv=1.0.1
  - requests=2.32.3
  - ruff=0.4.0
  - tqdm=4.66.2
  - typer=0.9.4
  - ipykernel=6.29.5
  
  # Solver libraries
  - glpk
  # CPLEX and GUROBI should be installed separately via pip/conda-forge
  
  # System tools
  - pip